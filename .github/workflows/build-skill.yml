name: Build .skill release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate SKILL.md frontmatter
        run: |
          set -e
          for skill in skills/*/SKILL.md; do
            head -5 "$skill" | grep -q "^name:" || { echo "Missing 'name' frontmatter in $skill"; exit 1; }
            head -5 "$skill" | grep -q "^description:" || { echo "Missing 'description' frontmatter in $skill"; exit 1; }
          done

      - name: Build pubcraft.skill
        run: |
          mkdir -p dist
          cd skills && zip -r ../dist/pubcraft.skill pubcraft \
            -x '*.DS_Store' '*/.DS_Store' '**/.DS_Store'

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/pubcraft.skill
          generate_release_notes: true
          fail_on_unmatched_files: true
